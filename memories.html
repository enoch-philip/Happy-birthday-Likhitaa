<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- Animated Background -->

<div class="background">

<div class="circle c1"></div>

<div class="circle c2"></div>

<div class="circle c3"></div>

<div class="circle c4"></div>

<div class="circle c5"></div>

</div>

<!-- Floating Hearts -->

<div id="floating"></div>

<section class="page active">

<div class="glass memoriesCard">

<h1 class="memoryTitle">

✨ Our Beautiful Memories ❤️

</h1>

<p class="memoryText">

Every picture tells a story.

Every video brings a smile.

Every memory reminds me how lucky I am.

</p>

<div class="memoryLayout">

<!-- LEFT VIDEOS -->

<div class="videoColumn">

<video controls
poster="photo.jpg">

<source src="video1.mp4"
type="video/mp4">

</video>

<video controls>

<source src="video2.mp4"
type="video/mp4">

</video>

<video controls>

<source src="video3.mp4"
type="video/mp4">

</video>

</div>

<!-- CENTER PHOTO -->

<div class="photoBox">

<img src="photo.jpg"
alt="Memory Photo">

</div>

<!-- RIGHT VIDEOS -->

<div class="videoColumn">

<video controls>

<source src="video4.mp4"
type="video/mp4">

</video>

<video controls>

<source src="video5.mp4"
type="video/mp4">

</video>

<video controls>

<source src="video6.mp4"
type="video/mp4">

</video>

</div>

</div>

<div class="buttons">

<a href="index.html">

<button>

🏠 Home

</button>

</a>

<a href="letter.html">

<button>

💌 Letter For You

</button>

</a>

</div>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
